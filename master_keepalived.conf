vrrp_instance VI_K8S_MASTER {
    state MASTER          # เครื่องที่ 2, 3 ให้ใส่ BACKUP
    interface eth0        # เช็กชื่อ Interface ด้วยคำสั่ง ip link
    virtual_router_id 51
    priority 255          # เครื่องที่ 2 ใส่ 250, เครื่องที่ 3 ใส่ 245
    advert_int 1
    authentication { auth_type PASS; auth_pass k8s_api_pwd; }
    virtual_ipaddress { 192.168.1.100 }
}