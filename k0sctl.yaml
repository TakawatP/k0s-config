apiVersion: k0sctl.k0sproject.io/v1beta1
kind: Cluster
metadata:
  name: k8s-production-cib
spec:
  hosts:
    # --- Master Nodes (Controllers) ---
    - role: controller
      ssh: { address: 192.168.1.10, user: root, keyPath: ~/.ssh/id_rsa }
    - role: controller
      ssh: { address: 192.168.1.11, user: root, keyPath: ~/.ssh/id_rsa }
    - role: controller
      ssh: { address: 192.168.1.12, user: root, keyPath: ~/.ssh/id_rsa }

    # --- Worker Nodes ---
    - role: worker
      ssh: { address: 192.168.1.20, user: root, keyPath: ~/.ssh/id_rsa }
    - role: worker
      ssh: { address: 192.168.1.21, user: root, keyPath: ~/.ssh/id_rsa }
    - role: worker
      ssh: { address: 192.168.1.22, user: root, keyPath: ~/.ssh/id_rsa }

  k0s:
    config:
      spec:
        api:
          externalAddress: 192.168.1.100 # IP ของ VIP ฝั่ง Master
          sans:
            - 192.168.1.100 # ใส่ VIP เข้าไปใน SSL Cert
            - 192.168.1.200 # IP ของ VIP ฝั่ง Worker
            - k8s-api.cib.go.th # SAN สำหรับ DNS ของ API Server
        network:
          provider: calico # ใช้ Calico ตามที่ต้องการ
        extensions:
          helm:
            repositories:
              - name: ingress-nginx
                url: https://kubernetes.github.io/ingress-nginx
            charts:
              - name: ingress-nginx
                chartname: ingress-nginx/ingress-nginx
                namespace: ingress-nginx
                values: |
                  controller:
                    kind: DaemonSet
                    hostNetwork: true
                    containerPort:
                      http: 31080
                      https: 31443
                    service:
                      type: ClusterIP
                    config:
                      use-forwarded-headers: "true"